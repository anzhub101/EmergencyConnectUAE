spring:
  application:
    name: emergencyconnectuae-backend
  datasource:
    # Supabase Session pooler (IPv4-reachable). The direct host is IPv6-only and
    # connects intermittently; the pooler is stable. NOTE: the pooler requires
    # the username form `postgres.<project-ref>`, not plain `postgres`.
    url: ${DB_URL:jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres?connectTimeout=30&socketTimeout=60&tcpKeepAlive=true}
    password: ${DB_PASSWORD:EmergencyConnectUae}
    username: ${DB_USERNAME:postgres.jdevzqbzbxnhqnynrmgg}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Tuned for the Supabase pooler (free tier has a small connection budget,
      # and the pooler closes idle server connections).
      maximum-pool-size: 5              # keep well under the pooler's limit
      minimum-idle: 1
      connection-timeout: 30000
      max-lifetime: 120000              # recycle before the pooler drops idle conns
      keepalive-time: 30000             # probe idle conns to keep them alive
      idle-timeout: 60000
      connection-test-query: SELECT 1   # validate borrowed conns (pooler-safe)
      initialization-fail-timeout: -1   # don't crash startup if DB is briefly unreachable
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        # Hibernate 6 (Spring Boot 3.2): spatial support is enabled automatically
        # by hibernate-spatial on the classpath; the standard PostgreSQL dialect
        # maps GEOGRAPHY(POINT,4326) <-> org.locationtech.jts.geom.Point.
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          # Accepted signing algorithms (ES256 for Supabase) are configured on
          # the JwtDecoder bean in SecurityConfig, which overrides this section.
          jwk-set-uri: ${SUPABASE_JWKS_URI:https://jdevzqbzbxnhqnynrmgg.supabase.co/auth/v1/.well-known/jwks.json}

redisson:
  address: ${REDIS_ADDRESS:redis://127.0.0.1:6379}
  password: ${REDIS_PASSWORD:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://localhost:3000}

server:
  port: ${SERVER_PORT:8443}
  ssl:
    # TLS via a self-signed certificate (dev/course use). Regenerate the
    # keystore with the keytool command documented in src/main/resources/README.
    enabled: ${SSL_ENABLED:true}
    key-store: ${SSL_KEYSTORE:classpath:keystore.p12}
    key-store-type: PKCS12
    key-store-password: ${SSL_KEYSTORE_PASSWORD:changeit}
    key-alias: ${SSL_KEY_ALIAS:emergencyconnect}
  # Plain-HTTP port that redirects (301) to HTTPS. Active only when SSL is on.
  http:
    port: ${HTTP_REDIRECT_PORT:8080}
