spring:
  application:
    name: emergencyconnectuae-backend
  datasource:
    # connectTimeout/socketTimeout raised from the pg default (10s) because the
    # Supabase direct host is IPv6-only in ap-south-1 and the path can be slow.
    url: ${DB_URL:jdbc:postgresql://db.jdevzqbzbxnhqnynrmgg.supabase.co:5432/postgres?connectTimeout=30&socketTimeout=60&tcpKeepAlive=true}
    password: ${DB_PASSWORD:EmergencyConnectUae}
    username: ${DB_USERNAME:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: -1   # don't crash startup if DB is briefly unreachable
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        # Hibernate 6 (Spring Boot 3.2): spatial support is enabled automatically
        # by hibernate-spatial on the classpath; the standard PostgreSQL dialect
        # maps GEOGRAPHY(POINT,4326) <-> org.locationtech.jts.geom.Point.
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          # Accepted signing algorithms (ES256 for Supabase) are configured on
          # the JwtDecoder bean in SecurityConfig, which overrides this section.
          jwk-set-uri: ${SUPABASE_JWKS_URI:https://jdevzqbzbxnhqnynrmgg.supabase.co/auth/v1/.well-known/jwks.json}

redisson:
  address: ${REDIS_ADDRESS:redis://127.0.0.1:6379}
  password: ${REDIS_PASSWORD:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

server:
  port: 8080
